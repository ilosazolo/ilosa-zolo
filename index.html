    <style>
        /* Base Styling & Cozy Dark Aesthetic */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        body, html {
            width: 100%;
            height: 100%;
            font-family: 'EB Garamond', serif;
            background-color: #0a0a0a;
            color: #e0e0e0;
            overflow-x: hidden;
        }
        /* Starry Background Container */
        #particles-js {
            position: fixed;
            width: 100%;
            height: 100%;
            top: 0;
            left: 0;
            z-index: 1;
            background-color: #050505;
        }
        /* Content Wrapper */
        .site-container {
            position: relative;
            z-index: 2;
            max-width: 800px;
            margin: 0 auto;
            padding: 60px 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }
        header {
            text-align: center;
            margin-bottom: 50px;
        }
        h1 {
            font-size: 2.2rem;
            font-weight: 400;
            font-style: italic;
            letter-spacing: 1px;
            color: #ffffff;
            text-shadow: 0 0 10px rgba(255,255,255,0.1);
        }
        /* Secret Writing Panel (Hidden by default) */
        #adminPanel {
            display: none;
            width: 100%;
            max-width: 600px;
            margin-bottom: 40px;
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid rgba(255, 255, 255, 0.15);
            padding: 30px;
            border-radius: 8px;
            box-shadow: 0 4px 30px rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(4px);
            animation: fadeIn 0.5s ease forwards;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .form-group {
            margin-bottom: 20px;
            text-align: left;
        }
        .form-group label {
            display: block;
            font-size: 1.2rem;
            color: #b0b0b0;
            margin-bottom: 8px;
        }
        .form-group input, .form-group textarea {
            width: 100%;
            background: rgba(255, 255, 255, 0.04);
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 4px;
            padding: 12px;
            color: #ffffff;
            font-family: 'EB Garamond', serif;
            font-size: 1.1rem;
            transition: all 0.3s ease;
        }
        .form-group input:focus, .form-group textarea:focus {
            outline: none;
            border-color: rgba(255, 255, 255, 0.4);
            background: rgba(255, 255, 255, 0.08);
        }
        /* Canvas Sketchpad Design */
        .canvas-container {
            border: 1px solid rgba(255, 255, 255, 0.15);
            background: #111111;
            border-radius: 4px;
            overflow: hidden;
        }
        #drawingCanvas {
            display: block;
            background: #111111;
            cursor: crosshair;
            width: 100%;
            height: 250px;
        }
        .canvas-controls {
            padding: 10px;
            background: rgba(255, 255, 255, 0.02);
            border-top: 1px solid rgba(255, 255, 255, 0.1);
            text-align: right;
        }
        .form-btn {
            font-family: 'EB Garamond', serif;
            font-size: 1.1rem;
            padding: 8px 16px;
            border-radius: 4px;
            cursor: pointer;
            transition: all 0.3s;
        }
        .secondary-btn {
            background: transparent;
            color: #909090;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        .secondary-btn:hover {
            color: #ffffff;
            border-color: rgba(255, 255, 255, 0.3);
        }
        .main-submit-btn {
            width: 100%;
            background: rgba(255, 255, 255, 0.08);
            color: #ffffff;
            border: 1px solid rgba(255, 255, 255, 0.25);
            padding: 14px;
            font-size: 1.3rem;
            letter-spacing: 1px;
            margin-top: 10px;
        }
        .main-submit-btn:hover {
            background: rgba(255, 255, 255, 0.15);
        }
        /* Archive List View */
        #feedSection {
            width: 100%;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }
        .journal-card {
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 6px;
            width: 100%;
            max-width: 600px;
            margin: 0 auto;
            overflow: hidden;
            transition: all 0.4s ease;
            backdrop-filter: blur(2px);
        }
        .journal-card:hover {
            border-color: rgba(255, 255, 255, 0.2);
            background: rgba(255, 255, 255, 0.03);
        }
        .journal-header {
            padding: 20px 24px;
            cursor: pointer;
            display: flex;
            justify-content: space-between;
            align-items: center;
            user-select: none;
        }
        .entry-title {
            font-size: 1.4rem;
            font-weight: 500;
            color: #ffffff;
            letter-spacing: 0.5px;
        }
        .entry-date {
            font-size: 1rem;
            color: #666666;
            font-style: italic;
        }
        .journal-body {
            max-height: 0;
            padding: 0 24px;
            opacity: 0;
            transition: all 0.4s cubic-bezier(0, 1, 0, 1);
            text-align: left;
            border-top: 1px solid transparent;
        }
        .journal-card.expanded .journal-body {
            max-height: 3000px;
            padding: 24px;
            opacity: 1;
            border-top: 1px solid rgba(255, 255, 255, 0.06);
            transition: all 0.4s cubic-bezier(1, 0, 1, 0);
        }
        .body-text {
            font-size: 1.25rem;
            line-height: 1.8;
            color: #cccccc;
            white-space: pre-wrap;
        }
        .saved-art-wrapper {
            margin-top: 25px;
            border: 1px solid rgba(255, 255, 255, 0.06);
            background: #111111;
            border-radius: 4px;
            max-width: 450px;
            overflow: hidden;
        }
        .saved-art-img {
            display: block;
            width: 100%;
            height: auto;
            mix-blend-mode: screen;
        }
        /* Aesthetic Social Icons Block */
        .social-container {
            display: flex;
            justify-content: center;
            gap: 25px;
            margin-top: 50px;
            margin-bottom: 10px;
        }
        .social-link {
            color: rgba(255, 255, 255, 0.4);
            transition: all 0.3s ease;
            display: inline-block;
        }
        .social-link:hover {
            color: #ffffff;
            transform: translateY(-2px);
            filter: drop-shadow(0 0 5px rgba(255,255,255,0.2));
        }
        .social-link svg {
            width: 22px;
            height: 22px;
            fill: currentColor;
        }
        /* Footer Styling */
        footer {
            margin-top: auto;
            padding-top: 40px;
            text-align: center;
            font-size: 1.05rem;
            color: #555555;
            width: 100%;
            letter-spacing: 0.5px;
        }
        .secret-trigger {
            color: #555555;
            text-decoration: none;
            cursor: default;
        }
        .copyright {
            margin-top: 10px;
            font-size: 0.85rem;
            letter-spacing: 1px;
            color: #444444;
        }
    </style>
</head>
<body>

    <!-- Background Engine Integration -->
    <script src="https://cdn.jsdelivr.net/npm/particles.js@2.0.0/particles.min.js"></script>
    
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, collection, addDoc, getDocs, query, orderBy } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        // Reuse your working configuration smoothly
        const firebaseConfig = {
            apiKey: "AIzaSyBrsqAcI4TbTKPiRzhd-VrhXQJTr7Lzzd8",
            authDomain: "graveyard-words.firebaseapp.com",
            projectId: "graveyard-words",
            storageBucket: "graveyard-words.firebasestorage.app",
            messagingSenderId: "915982371340",
            appId: "1:915982371340:web:a4d2b04dc5c8c913f57c29",
            measurementId: "G-YSE5EEKV9L"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        // --- SECRET UNLOCK GATEWAY ---
        window.unlockDesk = function() {
            const pass = prompt("Enter password to access writing desk:");
            if (pass === "azm8146") {
                document.getElementById('adminPanel').style.display = "block";
                window.scrollTo({ top: 0, behavior: 'smooth' });
                alert("Welcome back, Ilosa.");
            } else if (pass !== null) {
                alert("Access Denied.");
            }
        }

        // --- DRAWING CANVAS LOGIC ---
        const canvas = document.getElementById('drawingCanvas');
        const ctx = canvas.getContext('2d');
        let isDrawing = false;

        ctx.strokeStyle = '#ffffff';
        ctx.lineWidth = 1.5;
        ctx.lineCap = 'round';
        ctx.lineJoin = 'round';

        canvas.addEventListener('mousedown', (e) => { isDrawing = true; draw(e); });
        canvas.addEventListener('mousemove', draw);
        canvas.addEventListener('mouseup', () => { isDrawing = false; ctx.beginPath(); });
        canvas.addEventListener('mouseleave', () => { isDrawing = false; ctx.beginPath(); });
        
        canvas.addEventListener('touchstart', (e) => { isDrawing = true; draw(e.touches[0]); e.preventDefault(); });
        canvas.addEventListener('touchmove', (e) => { draw(e.touches[0]); e.preventDefault(); });
        canvas.addEventListener('touchend', () => { isDrawing = false; ctx.beginPath(); });

        function draw(e) {
            if (!isDrawing) return;
            const rect = canvas.getBoundingClientRect();
            const scaleX = canvas.width / rect.width;
            const scaleY = canvas.height / rect.height;
            const x = (e.clientX - rect.left) * scaleX;
            const y = (e.clientY - rect.top) * scaleY;
            ctx.lineTo(x, y);
            ctx.stroke();
            ctx.beginPath();
            ctx.moveTo(x, y);
        }

        window.clearCanvas = function() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
        }

        function isCanvasBlank() {
            const blank = document.createElement('canvas');
            blank.width = canvas.width;
            blank.height = canvas.height;
            return canvas.toDataURL() === blank.toDataURL();
        }

        // --- SUBMIT WORK TO SEPARATE FOLDER ("writings") ---
        window.publishEntry = async function() {
            const title = document.getElementById('postTitle').value.trim();
            const content = document.getElementById('postContent').value.trim();

            if (!title || !content) {
                alert("Fields cannot be blank.");
                return;
            }

            let artDataURL = "";
            if (!isCanvasBlank()) {
                artDataURL = canvas.toDataURL();
            }

            try {
                await addDoc(collection(db, "writings"), {
                    title: title,
                    content: content,
                    art: artDataURL,
                    timestamp: new Date()
                });

                alert("Entry permanently committed to archive.");
                
                // Clear fields
                document.getElementById('postTitle').value = "";
                document.getElementById('postContent').value = "";
                clearCanvas();
                
                // Hide panel again & reload feed
                document.getElementById('adminPanel').style.display = "none";
                loadArchive();

            } catch (error) {
                console.error("Database save crash: ", error);
                alert("Error committing entry.");
            }
        }

        // --- READ MODE: RENDER ARCHIVES ---
        async function loadArchive() {
            const container = document.getElementById('feedSection');
            try {
                const q = query(collection(db, "writings"), orderBy("timestamp", "desc"));
                const querySnapshot = await getDocs(q);
                
                if (querySnapshot.empty) {
                    container.innerHTML = '<div style="text-align:center; color:#555; font-style:italic; font-size:1.2rem;">The archive collection is currently empty.</div>';
                    return;
                }

                container.innerHTML = '';
                querySnapshot.forEach((doc) => {
                    const data = doc.data();
                    
                    // Format pristine dates elegantly
                    let dateString = "";
                    if (data.timestamp) {
                        const dateObj = data.timestamp.toDate();
                        dateString = dateObj.toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });
                    }

                    const card = document.createElement('div');
                    card.className = 'journal-card';
                    
                    let imageElement = data.art ? `<div class="saved-art-wrapper"><img src="${data.art}" class="saved-art-img" /></div>` : '';

                    card.innerHTML = `
                        <div class="journal-header" onclick="toggleCard(this)">
                            <span class="entry-title">${data.title}</span>
                            <span class="entry-date">${dateString}</span>
                        </div>
                        <div class="journal-body">
                            <p class="body-text">${data.content.replace(/\n/g, '<br>')}</p>
                            ${imageElement}
                        </div>
                    `;
                    container.appendChild(card);
                });
            } catch (error) {
                console.error("Fetch failure: ", error);
                container.innerHTML = '<div style="text-align:center; color:#555;">Failed to safely reach the database archive.</div>';
            }
        }

        window.toggleCard = function(el) {
            el.parentElement.classList.toggle('expanded');
        }

        // Load archive records instantly on load
        loadArchive();

        // Particles Background Parameters
        particlesJS('particles-js', {
            "particles": {
                "number": { "value": 80, "density": { "enable": true, "value_area": 800 } },
                "color": { "value": "#ffffff" },
                "shape": { "type": "circle" },
                "opacity": { "value": 0.4, "random": true, "anim": { "enable": true, "speed": 0.5, "opacity_min": 0.1, "sync": false } },
                "size": { "value": 1.5, "random": true, "anim": { "enable": true, "speed": 1, "size_min": 0.5, "sync": false } },
                "line_linked": { "enable": false },
                "move": { "enable": true, "speed": 0.2, "direction": "none", "random": true, "straight": false, "out_mode": "out", "bounce": false }
            },
            "interactivity": { "detect_on": "canvas", "events": { "onhover": { "enable": false }, "onclick": { "enable": false } } },
            "retina_detect": true
        });
    </script>
</body>
